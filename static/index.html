<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Workout Stats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding:16px;min-height:100vh}
:root{--bg:#fff;--text:#000;--hint:#999;--btn:#2481cc;--btn-text:#fff;--section:#f0f0f0;--green:#4CAF50;--orange:#FF9800;--blue:#2196F3}
.header{text-align:center;padding:12px 0 20px}
.header h1{font-size:22px;font-weight:700}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:var(--section);border-radius:14px;padding:16px;text-align:center}
.stat-value{font-size:28px;font-weight:800}
.stat-label{font-size:12px;color:var(--hint);margin-top:4px;text-transform:uppercase}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.orange .stat-value{color:var(--orange)}
.stat-card.blue .stat-value{color:var(--blue)}
.calendar{background:var(--section);border-radius:14px;padding:16px;margin-bottom:20px}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.calendar-header h2{font-size:17px;font-weight:600}
.calendar-nav{display:flex;gap:8px}
.calendar-nav button{background:none;border:1px solid rgba(128,128,128,0.3);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:16px}
.calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.calendar-weekdays span{text-align:center;font-size:11px;font-weight:600;color:var(--hint);padding:4px 0;text-transform:uppercase}
.calendar-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:8px;cursor:default;transition:background 0.2s}
.calendar-day.other-month{opacity:0.25}
.calendar-day.today{font-weight:700;border:2px solid var(--btn)}
.calendar-day.completed{background:var(--green);color:#fff}
.action-btn{display:block;width:100%;padding:16px;background:var(--btn);color:var(--btn-text);border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;margin-top:12px}
.action-btn:active{opacity:0.8}
.action-btn:disabled{opacity:0.4;cursor:not-allowed}
.progress-bar{margin:12px 0 20px}
.progress-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.progress-track{height:8px;background:var(--section);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:4px;transition:width 0.5s}
.legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-dot.green{background:var(--green)}
.legend-dot.blue{background:rgba(33,150,243,0.3)}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--text:#fff;--hint:#8e8e93;--section:#2c2c2e}}
</style>
</head>
<body>
<div id="app">
<div class="header"><h1>Мои тренировки</h1><p id="greeting">Загружаю...</p></div>
<div class="stats-grid">
<div class="stat-card green"><div class="stat-value" id="totalWorkouts">0</div><div class="stat-label">Тренировок</div></div>
<div class="stat-card orange"><div class="stat-value" id="streak">0</div><div class="stat-label">Дней подряд</div></div>
<div class="stat-card blue"><div class="stat-value" id="currentDay">1</div><div class="stat-label">Текущий день</div></div>
<div class="stat-card blue"><div class="stat-value" id="cycles">0</div><div class="stat-label">Циклов</div></div>
</div>
<div class="progress-bar"><div class="progress-label"><span>Прогресс 90 дней</span><span id="progressPercent">0%</span></div>
<div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div>
<div class="calendar">
<div class="calendar-header"><h2 id="monthYear">Загрузка...</h2>
<div class="calendar-nav"><button id="prevMonth">◀</button><button id="nextMonth">▶</button></div></div>
<div class="calendar-weekdays"><span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span></div>
<div class="calendar-days" id="calendarDays"></div>
<div class="legend"><span class="legend-item"><span class="legend-dot green"></span> Выполнено</span>
<span class="legend-item"><span class="legend-dot blue"></span> Тренировка</span></div></div>
<button class="action-btn" id="completeBtn" disabled>Отметить тренировку</button>
</div>
<script>
var tg=window.Telegram?window.Telegram.WebApp:null;
if(tg){tg.ready();tg.expand();
var s=tg.themeParams;
var r=document.documentElement.style;
r.setProperty("--bg",s.bg_color||"#fff");
r.setProperty("--text",s.text_color||"#000");
r.setProperty("--hint",s.hint_color||"#999");
r.setProperty("--btn",s.button_color||"#2481cc");
r.setProperty("--btn-text",s.button_text_color||"#fff");
r.setProperty("--section",s.secondary_bg_color||"#f0f0f0");}
var state={userId:null,stats:null,curMonth:new Date().getMonth(),curYear:new Date().getFullYear()};
// Get user ID from Telegram WebApp or URL query param (for testing)
if(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user){
state.userId=tg.initDataUnsafe.user.id;
}else{
var p=new URLSearchParams(window.location.search);
var uid=p.get("user_id");
if(uid)state.userId=parseInt(uid,10);
}
if(state.userId)loadStats();
// Calendar navigation
document.getElementById("prevMonth").onclick=function(){state.curMonth--;if(state.curMonth<0){state.curMonth=11;state.curYear--}renderCalendar()};
document.getElementById("nextMonth").onclick=function(){state.curMonth++;if(state.curMonth>11){state.curMonth=0;state.curYear++}renderCalendar()};
function loadStats(){
if(!state.userId)return;
fetch("/api/stats?user_id="+state.userId)
.then(function(r){return r.json()})
.then(function(d){state.stats=d;render()})
.catch(function(){document.getElementById("greeting").textContent="Ошибка"})}
function doComplete(){
if(!state.userId||!state.stats)return;
var btn=document.getElementById("completeBtn");
btn.disabled=true;btn.textContent="Сохраняю...";
fetch("/api/complete",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user_id:state.userId,day_number:state.stats.current_day})})
.then(function(r){if(!r.ok)throw Error();if(tg)tg.HapticFeedback.impactOccurred("medium");return loadStats()})
.catch(function(){btn.disabled=false;btn.textContent="Ошибка, попробуйте снова"})}
function renderCalendar(){
var el=document.getElementById("calendarDays");el.innerHTML="";
var m=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
document.getElementById("monthYear").textContent=m[state.curMonth]+" "+state.curYear;
var first=new Date(state.curYear,state.curMonth,1);
var last=new Date(state.curYear,state.curMonth+1,0);
var off=first.getDay()===0?6:first.getDay()-1;
var dim=last.getDate();
var comps=state.stats?state.stats.completions||[]:[];
var done={};for(var i=0;i<comps.length;i++){done[comps[i].date]=true}
var td=new Date();var ts=td.getFullYear()+"-"+String(td.getMonth()+1).padStart(2,"0")+"-"+String(td.getDate()).padStart(2,"0");
var pv=new Date(state.curYear,state.curMonth,0);
for(var i=off-1;i>=0;i--){var d=document.createElement("div");d.className="calendar-day other-month";d.textContent=pv.getDate()-i;el.appendChild(d)}
for(var day=1;day<=dim;day++){
var d=document.createElement("div");d.className="calendar-day";
var ds=state.curYear+"-"+String(state.curMonth+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
if(done[ds])d.classList.add("completed");
if(ds===ts)d.classList.add("today");
d.textContent=day;el.appendChild(d)}
var t=off+dim;var r=7-(t%7);if(r<7){for(var i=1;i<=r;i++){var d=document.createElement("div");d.className="calendar-day other-month";d.textContent=i;el.appendChild(d)}}}
function render(){
if(!state.stats)return;var s=state.stats;
document.getElementById("totalWorkouts").textContent=s.total_completions;
document.getElementById("streak").textContent=s.streak;
document.getElementById("currentDay").textContent=s.current_day;
document.getElementById("cycles").textContent=s.cycles_completed;
var p=Math.min(100,Math.round((s.total_completions/90)*100));
document.getElementById("progressPercent").textContent=p+"%";
document.getElementById("progressFill").style.width=p+"%";
var btn=document.getElementById("completeBtn");
btn.disabled=false;btn.textContent="Отметить день "+s.current_day;
document.getElementById("greeting").textContent="День "+s.current_day+"/10";
renderCalendar()
}
</script>
</body>
</html>
